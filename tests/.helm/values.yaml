    # https://kubernetes.io/docs/concepts/workloads/pods/disruptions/#pod-disruption-budgets
    podDisruptionBudget:
      ## Enable/disable podDisruptionBudget.
      enabled: true
      ## Maximum number of unavailable (evicted) Pods.
      # https://kubernetes.io/docs/reference/generated/kubernetes-api/v1.32/#poddisruptionbudgetspec-v1-policy
      maxUnavailable: 1

    ## Collect resource consumption statistics for containers and (optionally) automatically set resource requests/limits.
    # https://cloud.google.com/kubernetes-engine/docs/concepts/verticalpodautoscaler
    verticalPodAutoscaler:
      ## Enable/disable verticalPodAutoscaler.
      enabled: true
      ## Whether to automatically set resources, and under what conditions.
      # "updateMode: Off" is sufficient for collecting statistics only.
      # https://cloud.google.com/kubernetes-engine/docs/concepts/verticalpodautoscaler#podupdatepolicy_v1_autoscalingk8sio
      updateMode: "Auto"
      ## Per-container resource policy for automatic resource assignment.
      # Passed as-is to VerticalPodAutoscaler.spec.resourcePolicy.
      # https://cloud.google.com/kubernetes-engine/docs/concepts/verticalpodautoscaler#verticalpodautoscalerspec_v1_autoscalingk8sio
      resourcePolicy: |
        containerPolicies:
        - containerName: "some-container"
          mode: "Off"

    ## Horizontal pod autoscaling.
    horizontalPodAutoscaler:
      ## Enable/disable horizontalPodAutoscaler.
      enabled: true
      ## Do not scale below this number of replicas.
      # https://kubernetes.io/docs/reference/generated/kubernetes-api/v1.32/#horizontalpodautoscalerspec-v2-autoscaling
      minReplicas: 1
      ## Do not scale above this number of replicas.
      # https://kubernetes.io/docs/reference/generated/kubernetes-api/v1.32/#horizontalpodautoscalerspec-v2-autoscaling
      maxReplicas: 1
      ## Scaling behavior.
      # Passed as-is to HorizontalPodAutoscaler.spec.behavior.
      # https://kubernetes.io/docs/reference/generated/kubernetes-api/v1.32/#horizontalpodautoscalerbehavior-v2-autoscaling
      behavior: |
        scaleDown:
          policies:
          - type: Percent
            value: 10
            periodSeconds: 60
      ## Metrics configuration for scaling decisions.
      # Passed as-is to HorizontalPodAutoscaler.spec.metrics.
      # https://kubernetes.io/docs/reference/generated/kubernetes-api/v1.32/#metricspec-v2-autoscaling
      metrics: |
        - type: Object
          object:
            describedObject:
              apiVersion: v1
              kind: Service
              name: {{ include "lib.valueQuoted" (list $ . $.CurrentApp.service.name) }}
            metric:
              name: "metric-1"
            target:
              type: Value
              value: 10000m

  # Application from the documentation example
  nginx:
    _include: ["apps-stateless-defaultApp"]
    replicas: 1
    automountServiceAccountToken: true
    containers:
      nginx:
        image:
          name: nginx
        ports: |
          - name: http
            containerPort: 80
        configFiles:
          default.conf:
            mountPath: /etc/nginx/templates/default.conf.template
            content: |
              server {
                listen         80 default_server;
                listen         [::]:80 default_server;
                server_name    {{ $.Values.global.ci_url }} {{ $.Values.global.ci_url }};
                root           /var/www/{{ $.Values.global.ci_url }};
                index          index.html;
                try_files $uri /index.html;
                location / {
                  proxy_set_header Authorization "Bearer ${SECRET_TOKEN}";
                  proxy_pass_header Authorization;
                  proxy_pass https://backend:3000;
                }
              }
        secretEnvVars:
          SECRET_TOKEN: "!!!secret-token-for-backend!!!"
    service:
      enabled: true
      ports: |
        - name: http
          port: 80
  minimum-app:
    _include: ["apps-stateless-defaultApp"]
    # enabled: false
    containers:
      container-1:
        enabled: true
        image:
          name: "alpine"
          staticTag: "3"
        command: |
          - tail
  pod-disruption-budget-integer:
    _include: ["apps-stateless-defaultApp"]
    # enabled: false
    replicas: 2
    podDisruptionBudget:
      enabled: true
      maxUnavailable: 1
    containers:
      container-1:
        enabled: true
        image:
          name: "alpine"
          staticTag: "3"
        command: |
          - tail
