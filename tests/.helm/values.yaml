fromSecretsEnvVars-test:
  # __GroupVars__ indicates that the block is a group and will be processed by the helm-apps library,
  # generating applications of the type specified in the type field.
  # It is also possible to override the type of a generated application within the application block itself,
  # by specifying its type in the __AppType__ variable, for example:
  # my-stateless-app:
  #   __AppType__: "apps-stateless"
  __GroupVars__:
    # type specifies what type of applications will be generated by the group.
    # An application can be declared as a template as follows:
    # create a file _<filename>.tpl in the .helm/templates directory
    # {{ define "<application type>.render" }}
    #  {{- $ := .}}
    #  {{- with $.CurrentApp}}
    # insert template code here
    # all variables from the generated application block will be available as .<variable name>
    #  {{- end}}
    # {{- end}}
    # or use an existing application type
    type: apps-stateless
  app-for-test-from-secrets-env-vars:
    _include: ["apps-stateless-defaultApp"]
    verticalPodAutoscaler:
      enabled: false
    containers:
      main:
        image:
          name: test
          staticTag: 1
        fromSecretsEnvVars:
          secret-1:
            APP_ENV_NAME_1: SECRET_ENV_NAME_1
            APP_ENV_NAME_2: SECRET_ENV_NAME_2
  secret-1:
    # Within an existing group, you can change the type of any application
    # by specifying its type in the __AppType__ variable.
    __AppType__: apps-secrets
    envVars:
      SECRET_ENV_NAME_1: test1
      SECRET_ENV_NAME_2: test2
test-common-group-hook:
  __GroupVars__:
    _include: ["apps-default-library-app"]
    type: apps-stateless
    _preRenderGroupHook: |
      {{ if include "lib.isTrue" (list $ . $.CurrentGroupVars.enabled) }}
      {{ set (index $.CurrentGroup "test-app") "enabled" true }}
      {{ set $.CurrentGroup "test-app-2" (index $.CurrentGroup "test-app" | deepCopy) }}
      {{ end }}
    _preRenderAppHook: |
      test
  test-app:
    _include: ["apps-stateless-defaultApp"]
    containers:
      main:
        image:
          name: test
          staticTag: 1
        envVars:
          test: test
    # serviceAccount generates a serviceAccount linked to the application and associates it with a ClusterRole and ClusterRoleBinding
    serviceAccount:
      enabled: true
      name: "{{ $.CurrentApp.name }}"
      clusterRole:
        name: "{{ $.CurrentApp.name }}:prometheus-access"
        rules: |
          - apiGroups: ["monitoring.coreos.com"]
            resources: ["prometheuses/http"]
            resourceNames: ["main", "longterm"]
            verbs: ["get"]
test-hpa:
  __GroupVars__:
    type: apps-stateless
  hpa-app:
    _include: ["apps-stateless-defaultApp"]
    selector: |
      app: my-selector
    containers:
      main:
        image:
          name: test
          staticTag: 1
        envVars:
          test: test
    ## Horizontal pod autoscaling.
    horizontalPodAutoscaler:
      ## Enable/disable horizontalPodAutoscaler.
      enabled: true
      ## Do not scale below this number of replicas.
      # https://kubernetes.io/docs/reference/generated/kubernetes-api/v1.32/#horizontalpodautoscalerspec-v2-autoscaling
      minReplicas: 3
      ## Do not scale above this number of replicas.
      # https://kubernetes.io/docs/reference/generated/kubernetes-api/v1.32/#horizontalpodautoscalerspec-v2-autoscaling
      maxReplicas: 10
      ## Scaling behavior.
      # Passed as-is to HorizontalPodAutoscaler.spec.behavior.
      # https://kubernetes.io/docs/reference/generated/kubernetes-api/v1.32/#horizontalpodautoscalerbehavior-v2-autoscaling
      behavior: |
        scaleDown:
          policies:
          - type: Percent
            value: 10
            periodSeconds: 60
      ## Metrics configuration for scaling decisions.
      # Passed as-is to HorizontalPodAutoscaler.spec.metrics.
      # https://kubernetes.io/docs/reference/generated/kubernetes-api/v1.32/#metricspec-v2-autoscaling
      metrics:
        cpu:
          enabled: true
          averageUtilization: 50
        memory:
          enabled: true
          averageUtilization: 30
        hpa-metric-1:
          enabled: true
          type: Object
          kind: Service
          targetValue: 10000m
          customMetricResourceName: custom-metric-1
    service:
      enabled: true
      name: "{{ $.CurrentApp.name }}"
      ports: |
        - name: http
          port: 80
      selector: |
        app: my-selector

