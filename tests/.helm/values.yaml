global:
  ci_url: example.com
  images:
    nginx: "registry.example.com/myapp/nginx:sha256-abc123"
  ## A more powerful alternative to Helm's limited YAML anchors. Avoids duplicating configuration across multiple apps.
  #
  # Configuration blocks are declared here under global._includes and can be referenced anywhere in values files.
  # Example of referencing a block:
  # -----------------------------------------------------------------------------------------------
  # .helm/values.yaml:
  # -----------------------------------------------------------------------------------------------
  # apps-cronjobs:
  #   cronjob-1:
  #     _include: ["apps-cronjobs-defaultCronJob"]
  #     backoffLimit: 1
  # -----------------------------------------------------------------------------------------------
  #
  # In the example above, the include block expands at apps-cronjobs.cronjob-1 level; then backoffLimit: 1 is merged on top, overriding the value from the block.
  #
  _includes:
    _include_from_file: helm-apps-defaults.yaml
    test-include-from-file:
      _include_from_file: config/test-include-from-file.yaml

## Chart name. Lists ConfigMaps for deployment below.
# Specified in Chart.yaml under dependencies.name or dependencies.alias.
# https://helm.sh/docs/topics/charts/#chart-dependencies
apps-configmaps:
  ## Name of the first ConfigMap.
  configmap-1:
    _include: ["apps-configmaps-defaultConfigmap"]
    ## Enable/disable ConfigMap creation.
    # enabled: false
    ## ConfigMap contents. Configuration files passed into containers.
    # Passed as-is to ConfigMap.data.
    # https://kubernetes.io/docs/reference/generated/kubernetes-api/v1.32/#configmap-v1-core
    data: |
      nginx.conf2: |
        configline1
        configline2
      something.conf: |
        configline1
    binaryData: |
      test.gz: jdbkjbkjsdbkjdbjdsbljl
    ## ConfigMap contents. Non-secret environment variables passed into containers.
    # Passed as-is to ConfigMap.data.
    envVars:
      TEST1: "val1"
      TEST2: "val2"
  configmap-2:
    _include: ["apps-configmaps-defaultConfigmap"]
    data:
      nginx.conf: |
        configline1
        configline2

## Chart name. Lists CronJobs for deployment below.
# Specified in Chart.yaml under dependencies.name or dependencies.alias.
# https://helm.sh/docs/topics/charts/#chart-dependencies
apps-cronjobs:
  ## Name of the first CronJob. Used mainly for generating resource names.
  cronjob-1:
    _include: ["apps-cronjobs-defaultCronJob"]
    ## Enable/disable the CronJob and its associated resources.
    # Enabled directly via Values here only to pass chart lint before publishing.
    # The application repository should not contain this line; instead, enable the CronJob via GitLab CI.
    ## Additional annotations for CronJob/Job/Pod.
    # Passed as-is to CronJob.metadata.annotations, CronJob.spec.jobTemplate.metadata.annotations
    # and CronJob.spec.jobTemplate.spec.template.metadata.annotations.
    # https://kubernetes.io/docs/concepts/overview/working-with-objects/annotations/
    annotations: |
      testAnnotation: "testVal"
    ## CronJob schedule in cron format.
    # https://en.wikipedia.org/wiki/Cron#Overview
    schedule: "0 * * * *"
    ## Concurrent execution policy.
    # https://kubernetes.io/docs/reference/generated/kubernetes-api/v1.32/#cronjobspec-v1-batch
    concurrencyPolicy: "Allow"
    ## How many successfully completed Jobs and their Pods to retain.
    # Can be reduced to avoid cluttering the namespace with old Pods.
    # https://kubernetes.io/docs/reference/generated/kubernetes-api/v1.32/#cronjobspec-v1-batch
    successfulJobsHistoryLimit: 1
    ## How many failed Jobs and their Pods to retain.
    # Can be reduced to avoid cluttering the namespace with old Pods.
    # https://kubernetes.io/docs/reference/generated/kubernetes-api/v1.32/#cronjobspec-v1-batch
    failedJobsHistoryLimit: 1
    ## Mark the Job as Failed if it has not started within the specified number of seconds
    # after the scheduled start time.
    # https://kubernetes.io/docs/reference/generated/kubernetes-api/v1.32/#cronjobspec-v1-batch
    startingDeadlineSeconds: 60
    ## Limit on restart attempts for the CronJob if it terminates with an error.
    # https://kubernetes.io/docs/reference/generated/kubernetes-api/v1.32/#jobspec-v1-batch
    backoffLimit: 0
    ## Maximum execution time for the CronJob, after which it will be forcibly terminated.
    # https://kubernetes.io/docs/reference/generated/kubernetes-api/v1.32/#jobspec-v1-batch
    activeDeadlineSeconds: 1800
    ## Secret names for pulling container images from a Docker registry.
    # Passed as-is to CronJob.spec.jobTemplate.spec.template.spec.imagePullSecrets.
    # https://kubernetes.io/docs/reference/generated/kubernetes-api/v1.32/#podspec-v1-core
    imagePullSecrets: |
      - name: registrysecret
    ## Rules for pod scheduling.
    # Passed as-is to CronJob.spec.jobTemplate.spec.template.spec.affinity.
    # https://kubernetes.io/docs/reference/generated/kubernetes-api/v1.32/#affinity-v1-core
    affinity: |
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
        - podAffinityTerm:
            labelSelector:
              matchLabels: {{- include "lib.generateLabels" (list $ . $.CurrentApp.name) | nindent 22 }}
            topologyKey: kubernetes.io/hostname
          weight: 10
    ## Allow scheduling pods on tainted nodes.
    # Passed as-is to CronJob.spec.jobTemplate.spec.template.spec.tolerations.
    # https://kubernetes.io/docs/reference/generated/kubernetes-api/v1.32/#toleration-v1-core
    tolerations: |
      - key: something
        operator: Equal
        value: somethingelse
    ## Pod scheduling priority.
    # Pods with lower priority may be evicted or rescheduled when node or cluster resources are insufficient.
    # https://kubernetes.io/docs/reference/generated/kubernetes-api/v1.32/#podspec-v1-core
    priorityClassName: "production-medium"
    ## Whether to restart containers if they fail to start.
    # https://kubernetes.io/docs/reference/generated/kubernetes-api/v1.32/#podspec-v1-core
    restartPolicy: "Never"
    ## Volumes available to mount in containers of the CronJob.
    # Mounting is configured below under (init)containers.volumeMounts.
    # Passed as-is to CronJob.spec.jobTemplate.spec.template.spec.volumes.
    # https://kubernetes.io/docs/reference/generated/kubernetes-api/v1.32/#volume-v1-core
    volumes: |
      - name: cache-volume
        emptyDir: {}

    ## Container list for the CronJob. Multiple containers can be specified.
    containers:
      ## Container name.
      container-1:
        ## Enable/disable the container.
        enabled: true
        ## Image name from global.images map (dynamic), or use staticTag for a fixed tag:
        # image:
        #   name: "alpine"
        #   staticTag: "3"
        image:
          name: "alpine"
          staticTag: "3"
        ## Command to run on container start.
        # Passed as-is to CronJob.spec.jobTemplate.spec.template.spec.containers.command.
        # https://kubernetes.io/docs/reference/generated/kubernetes-api/v1.32/#container-v1-core
        command: |
          - tail
        ## Arguments for the startup command.
        # Passed as-is to CronJob.spec.jobTemplate.spec.template.spec.containers.args.
        # https://kubernetes.io/docs/reference/generated/kubernetes-api/v1.32/#container-v1-core
        args: |
          - -f
          - /dev/null
        ## Non-secret environment variables for the container.
        envVars:
          TEST1: "val1"
          TEST2: "val2"
        ## Secret environment variables for the container.
        # Automatically create a Secret with the specified variables, mount it, and inject them into the container.
        secretEnvVars:
          TEST1: "val1"
          TEST2: "val2"
        ## Inject environment variables from a ConfigMap or Secret into the container.
        # Passed as-is to CronJob.spec.jobTemplate.spec.template.spec.containers.envFrom.
        # https://kubernetes.io/docs/reference/generated/kubernetes-api/v1.32/#envfromsource-v1-core
        envFrom: |
          - configMapRef:
              name: env-configmap
        ## Container resource requests and limits.
        resources:
          requests:
            mcpu: 100
            memoryMb: 200
          limits:
            mcpu: null
            memoryMb: 200
        ## Hooks that run when the container starts or stops.
        # If the application cannot gracefully shut down on its own when it receives STOPSIGNAL (usually TERM),
        # you can specify a command here to gracefully terminate your application.
        # Passed as-is to CronJob.spec.jobTemplate.spec.template.spec.containers.lifecycle.
        # https://kubernetes.io/docs/reference/generated/kubernetes-api/v1.32/#lifecycle-v1-core
        lifecycle: |
          preStop:
            exec:
              command: ["/usr/sbin/nginx", "-s", "quit"]
        ## Mount a volume into the container.
        # The volume must first be added to the "volumes:" parameter above.
        # Passed as-is to CronJob.spec.jobTemplate.spec.template.spec.containers.volumeMounts.
        # https://kubernetes.io/docs/reference/generated/kubernetes-api/v1.32/#volumemount-v1-core
        volumeMounts: |
          - mountPath: /cache
            name: cache-volume
        ## Non-secret configuration files for the container. Multiple files can be specified.
        # Automatically creates ConfigMaps and mounts them into the container at the specified path.
        configFiles:
          ## Name of the first configuration file.
          nginx.conf:
            ## Mount path for the file inside the container.
            # Passed as-is to Job.spec.template.spec.containers.volumeMounts.mountPath.
            # https://kubernetes.io/docs/reference/generated/kubernetes-api/v1.32/#volumemount-v1-core
            mountPath: /etc/nginx/nginx.conf
            ## Contents of the configuration file.
            # Passed as-is to ConfigMap.data.<file name>.
            content: |
              configline1
              configline2
        ## Secret configuration files for the container. Multiple files can be specified.
        # Automatically creates Secrets and mounts them into the container at the specified path.
        secretConfigFiles:
          ## Name of the first configuration file.
          secret.conf:
            ## Mount path for the file inside the container.
            # Passed as-is to Job.spec.template.spec.containers.volumeMounts.mountPath.
            # https://kubernetes.io/docs/reference/generated/kubernetes-api/v1.32/#volumemount-v1-core
            mountPath: /etc/secret.conf
            # Automatically converted to base64 and stored in Secret.data.<file name>.
            content: |
              secretline1
              secretline2

    ## Init container list for the CronJob. Multiple containers can be specified.
    # Available parameter configuration is identical to the containers configuration described above ^^
    initContainers:
      init-container-1:
        enabled: true
        image:
          name: "alpine"
          staticTag: "3"
        command: |
          - tail
        args: |
          - -f
          - /dev/null
        envVars:
          TEST1: "val1"
        secretEnvVars:
          TEST1: "val1"
        envFrom: |
          - configMapRef:
              name: env-configmap
        resources:
          requests:
            mcpu: 100
            memoryMb: 200
          limits:
            mcpu: null
            memoryMb: 200
        lifecycle: |
          preStop:
            exec:
              command: ["/usr/sbin/nginx", "-s", "quit"]
        volumeMounts: |
          - mountPath: /cache
            name: cache-volume
        configFiles:
          nginx.conf:
            mountPath: /etc/nginx/nginx.conf
            content: |
              configline1
        secretConfigFiles:
          secret.conf:
            mountPath: /etc/secret.conf
            content: |
              secretline1

    ## Collect resource consumption statistics for containers and (optionally) automatically set resource requests/limits.
    # https://cloud.google.com/kubernetes-engine/docs/concepts/verticalpodautoscaler
    verticalPodAutoscaler:
      ## Enable/disable verticalPodAutoscaler.
      enabled: true
      ## Whether to automatically set resources, and under what conditions.
      # "updateMode: Off" is sufficient for collecting statistics only.
      # https://cloud.google.com/kubernetes-engine/docs/concepts/verticalpodautoscaler#podupdatepolicy_v1_autoscalingk8sio
      updateMode: "Initial"
      ## Per-container resource policy for automatic resource assignment.
      # Passed as-is to VerticalPodAutoscaler.spec.resourcePolicy.
      # https://cloud.google.com/kubernetes-engine/docs/concepts/verticalpodautoscaler#verticalpodautoscalerspec_v1_autoscalingk8sio
      resourcePolicy: |
        containerPolicies:
        - containerName: "some-container"
          mode: "Off"

## Chart name. Lists Ingresses for deployment below.
# Specified in Chart.yaml under dependencies.name or dependencies.alias.
# https://helm.sh/docs/topics/charts/#chart-dependencies
apps-ingresses:
  ## Name of the first Ingress.
  ingress-1:
    _include: ["apps-ingresses-defaultIngress"]
    ## Enable/disable the Ingress.
    # The application repository should not contain this line; instead, enable the Ingress via GitLab CI.
    # enabled: false
    ## Additional annotations for the Ingress.
    # Passed as-is to Ingress.metadata.annotations.
    # https://kubernetes.github.io/ingress-nginx/user-guide/nginx-configuration/annotations
    annotations: |
      nginx.ingress.kubernetes.io/auth-url: example.org
    ## Ingress class.
    # Passed into the "kubernetes.io/ingress.class" annotation.
    # https://kubernetes.io/docs/concepts/services-networking/ingress/#ingress-class
    class: "nginx"
    ## Ingress host domain.
    # Passed as-is to Ingress.spec.rules.host.
    # https://kubernetes.io/docs/reference/generated/kubernetes-api/v1.32/#ingressrule-v1-networking-k8s-io
    host: "example.org"
    ## Mapping of HTTP paths to Services.
    # Passed as-is to Ingress.spec.rules.http.paths.
    # https://kubernetes.io/docs/reference/generated/kubernetes-api/v1.32/#httpingresspath-v1-networking-k8s-io
    paths: |
      - path: /
        pathType: Prefix
        backend:
          service:
            name: testService
            port:
              number: 80
    ## Enables TLS handling and triggers Certificate creation.
    # Creates a Certificate automatically using values from other fields.
    tls:
      enabled: true
      ## Overrides Ingress.spec.tls.secretName.
      # Disables automatic Certificate creation.
      # https://kubernetes.io/docs/reference/generated/kubernetes-api/v1.32/#ingresstls-v1-networking-k8s-io
      secret_name: "test"

  ingress-2:
    _include: ["apps-ingresses-defaultIngress"]
    class: "nginx"
    host: "example.org"
    paths: |
      - path: /
        pathType: Prefix
        backend:
          service:
            name: testService
            port:
              number: 80
    tls:
      enabled: false
  ingress-3:
    _include: ["apps-ingresses-defaultIngress"]
    class: "nginx"
    host: "example.org"
    paths: |
      - path: /
        pathType: Prefix
        backend:
          service:
            name: testService
            port:
              number: 80
    tls:
      enabled: true
  ingress-4:
    _include: ["apps-ingresses-defaultIngress"]
    class: "nginx"
    ingressClassName: "nginx"
    host: "example.org"
    paths: |
      - path: /
        pathType: Prefix
        backend:
          service:
            name: testService
            port:
              number: 80
  # Application from the documentation example
  nginx:
    _include: ["apps-ingresses-defaultIngress"]
    host:  '{{ $.Values.global.ci_url }}'
    paths: |
      - path: /
        pathType: Prefix
        backend:
          service:
            name: nginx
            port:
              number: 80
    tls:
      enabled: true

## Chart name. Lists Jobs for deployment below.
# Specified in Chart.yaml under dependencies.name or dependencies.alias.
# https://helm.sh/docs/topics/charts/#chart-dependencies
apps-jobs:
  ## Name of the first Job. Used mainly for generating resource names.
  job-1:
    _include: ["apps-jobs-defaultJob"]
    ## Enable/disable the Job and its associated resources.
    # The application repository should not contain this line; instead, enable the Job via GitLab CI.
    # enabled: false
    # randomName enables/disables generation of a unique name for the job in the form "job-1-XXXXXXX" where XXXXXXX is a unique character sequence
    randomName: false
    # alwaysRestart adds the FL_APP_ALWAYS_RESTART variable to application containers with a random value
    alwaysRestart: false
    ## Additional annotations for Job/Pod.
    # Passed as-is to Job.metadata.annotations and Job.spec.template.metadata.annotations.
    # https://kubernetes.io/docs/concepts/overview/working-with-objects/annotations/
    annotations: |
      testAnnotation: "testVal"
    ## Limit on restart attempts for the Job if it terminates with an error.
    # https://kubernetes.io/docs/reference/generated/kubernetes-api/v1.32/#jobspec-v1-batch
    backoffLimit: 0
    ## Maximum execution time for the Job, after which it will be forcibly terminated.
    # https://kubernetes.io/docs/reference/generated/kubernetes-api/v1.32/#jobspec-v1-batch
    activeDeadlineSeconds: 1800
    ## Secret names for pulling container images from a Docker registry.
    # Passed as-is to Job.spec.template.spec.imagePullSecrets.
    # https://kubernetes.io/docs/reference/generated/kubernetes-api/v1.32/#podspec-v1-core
    imagePullSecrets: |
      - name: registrysecret
    ## Rules for pod scheduling.
    # Passed as-is to Job.spec.template.spec.affinity.
    # https://kubernetes.io/docs/reference/generated/kubernetes-api/v1.32/#affinity-v1-core
    affinity: |
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
        - podAffinityTerm:
            labelSelector:
              matchLabels: {{- include "lib.generateLabels" (list $ . $.CurrentApp.name) | nindent 22 }}
            topologyKey: kubernetes.io/hostname
          weight: 10
    ## Allow scheduling pods on tainted nodes.
    # Passed as-is to Job.spec.template.spec.tolerations.
    # https://kubernetes.io/docs/reference/generated/kubernetes-api/v1.32/#toleration-v1-core
    tolerations: |
      - key: something
        operator: Equal
        value: somethingelse
    ## Pod scheduling priority.
    # Pods with lower priority may be evicted or rescheduled when node or cluster resources are insufficient.
    # https://kubernetes.io/docs/reference/generated/kubernetes-api/v1.32/#podspec-v1-core
    priorityClassName: "production-medium"
    ## Whether to restart containers if they fail to start.
    # https://kubernetes.io/docs/reference/generated/kubernetes-api/v1.32/#podspec-v1-core
    restartPolicy: "Never"
    ## Volumes available to mount in containers of the Job.
    # Mounting is configured below under (init)containers.volumeMounts.
    # Passed as-is to Job.spec.template.spec.volumes.
    # https://kubernetes.io/docs/reference/generated/kubernetes-api/v1.32/#volume-v1-core
    volumes: |
      - name: cache-volume
        emptyDir: {}

    ## Container list for the Job. Multiple containers can be specified.
    containers:
      ## Container name.
      container-1:
        ## Enable/disable the container. Containers are enabled by default.
        # enabled: true
        ## Image name from global.images map (dynamic), or use staticTag for a fixed tag:
        # image:
        #   name: "alpine"
        #   staticTag: "3"
        image:
          name: "alpine"
          staticTag: "3"
        ## Command to run on container start.
        # Passed as-is to Job.spec.template.spec.containers.command.
        # https://kubernetes.io/docs/reference/generated/kubernetes-api/v1.32/#container-v1-core
        command: |
          - tail
        ## Arguments for the startup command.
        # Passed as-is to Job.spec.template.spec.containers.args.
        # https://kubernetes.io/docs/reference/generated/kubernetes-api/v1.32/#container-v1-core
        args: |
          - -f
          - /dev/null
        ## Non-secret environment variables for the container.
        envVars:
          TEST1: "val1"
          TEST2: "val2"
        ## Secret environment variables for the container.
        # Automatically create a Secret with the specified variables, mount it, and inject them into the container.
        secretEnvVars:
          TEST1: "val1"
          TEST2: "val2"
        ## Inject environment variables from a ConfigMap or Secret into the container.
        # Passed as-is to Job.spec.template.spec.containers.envFrom.
        # https://kubernetes.io/docs/reference/generated/kubernetes-api/v1.32/#envfromsource-v1-core
        envFrom: |
          - configMapRef:
              name: env-configmap
        ## Container resource requests and limits.
        resources:
          requests:
            mcpu: 100
            memoryMb: 200
          limits:
            mcpu: null
            memoryMb: 200
        ## Hooks that run when the container starts or stops.
        # If the application cannot gracefully shut down on its own when it receives STOPSIGNAL (usually TERM),
        # you can specify a command here to gracefully terminate your application.
        # Passed as-is to Job.spec.template.spec.containers.lifecycle.
        # https://kubernetes.io/docs/reference/generated/kubernetes-api/v1.32/#lifecycle-v1-core
        lifecycle: |
          preStop:
            exec:
              command: ["/usr/sbin/nginx", "-s", "quit"]
        ## Mount a volume into the container.
        # The volume must first be added to the "volumes:" parameter above.
        # Passed as-is to Job.spec.template.spec.containers.volumeMounts.
        # https://kubernetes.io/docs/reference/generated/kubernetes-api/v1.32/#volumemount-v1-core
        volumeMounts: |
          - mountPath: /cache
            name: cache-volume
        ## Non-secret configuration files for the container. Multiple files can be specified.
        # Automatically creates ConfigMaps and mounts them into the container at the specified path.
        configFiles:
          ## Name of the first configuration file.
          nginx.conf:
            ## Mount path for the file inside the container.
            # Passed as-is to Job.spec.template.spec.containers.volumeMounts.mountPath.
            # https://kubernetes.io/docs/reference/generated/kubernetes-api/v1.32/#volumemount-v1-core
            mountPath: /etc/nginx/nginx.conf
            ## Contents of the configuration file.
            # Passed as-is to ConfigMap.data.<file name>.
            content: |
              configline1
              configline2
        ## Secret configuration files for the container. Multiple files can be specified.
        # Automatically creates Secrets and mounts them into the container at the specified path.
        secretConfigFiles:
          ## Name of the first configuration file.
          secret.conf:
            ## Mount path for the file inside the container.
            # Passed as-is to Job.spec.template.spec.containers.volumeMounts.mountPath.
            # https://kubernetes.io/docs/reference/generated/kubernetes-api/v1.32/#volumemount-v1-core
            mountPath: /etc/secret.conf
            # Automatically converted to base64 and stored in Secret.data.<file name>.
            content: |
              secretline1
              secretline2

    ## Init container list for the Job. Multiple containers can be specified.
    # Available parameter configuration is identical to the containers configuration described above ^^
    initContainers:
      init-container-1:
        # enabled: true
        image:
          name: "alpine"
          staticTag: "3"
        command: |
          - tail
        args: |
          - -f
          - /dev/null
        envVars:
          TEST1: "val1"
        secretEnvVars:
          TEST1: "val1"
        envFrom: |
          - configMapRef:
              name: env-configmap
        resources:
          requests:
            mcpu: 100
            memoryMb: 200
          limits:
            mcpu: null
            memoryMb: 200
        lifecycle: |
          preStop:
            exec:
              command: ["/usr/sbin/nginx", "-s", "quit"]
        volumeMounts: |
          - mountPath: /cache
            name: cache-volume
        configFiles:
          nginx.conf:
            mountPath: /etc/nginx/nginx.conf
            content: |
              configline1
        secretConfigFiles:
          secret.conf:
            mountPath: /etc/secret.conf
            content: |
              secretline1

    ## Collect resource consumption statistics for containers and (optionally) automatically set resource requests/limits.
    # https://cloud.google.com/kubernetes-engine/docs/concepts/verticalpodautoscaler
    verticalPodAutoscaler:
      ## Enable/disable verticalPodAutoscaler.
      enabled: true
      ## Whether to automatically set resources, and under what conditions.
      # "updateMode: Off" is sufficient for collecting statistics only.
      # https://cloud.google.com/kubernetes-engine/docs/concepts/verticalpodautoscaler#podupdatepolicy_v1_autoscalingk8sio
      updateMode: "Initial"
      ## Per-container resource policy for automatic resource assignment.
      # Passed as-is to VerticalPodAutoscaler.spec.resourcePolicy.
      # https://cloud.google.com/kubernetes-engine/docs/concepts/verticalpodautoscaler#verticalpodautoscalerspec_v1_autoscalingk8sio
      resourcePolicy: |
        containerPolicies:
        - containerName: "some-container"
          mode: "Off"

## Chart name. Lists Secrets for deployment below.
# Specified in Chart.yaml under dependencies.name or dependencies.alias.
# https://helm.sh/docs/topics/charts/#chart-dependencies
apps-secrets:
  ## Name of the first Secret.
  secret-1:
    _include: ["apps-secrets-defaultSecret"]
    ## Enable/disable Secret creation.
    ## Secret type.
    # If not specified, "Opaque" is set automatically (usually what you want).
    # https://kubernetes.io/docs/concepts/configuration/secret/#secret-types
    type: "Opaque"
    ## Secret contents. Usually configuration files passed into containers.
    # Automatically converted to base64 and stored in Secret.data.
    # https://kubernetes.io/docs/reference/generated/kubernetes-api/v1.32/#secret-v1-core
    data:
      secret.conf: |
        plainTextLine1
        plainTextLine2
      secret2.conf: |
        plainTextLine1
    ## Secret contents. Secret environment variables passed into containers.
    # Passed as-is to Secret.data.
    envVars:
      TEST1: "val1"
      TEST2: "val2"

## Chart name. Lists stateful applications for deployment below.
# Specified in Chart.yaml under dependencies.name or dependencies.alias.
# https://helm.sh/docs/topics/charts/#chart-dependencies
apps-stateful:
  ## Name of the first application. Used mainly for generating resource names.
  app-1:
    _include: ["apps-stateful-defaultApp"]
    ## Enable/disable the application.
    # The application repository should not contain this line; instead, enable the application via GitLab CI.
    # enabled: false
    ## Additional annotations for Deployment/Pod.
    # Passed as-is to Deployment.metadata.annotations and Deployment.spec.template.metadata.annotations.
