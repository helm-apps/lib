      app: test-app

test-env-yaml:
  __GroupVars__:
    type: apps-stateless
  env-yaml-app:
    _include: ["apps-stateless-defaultApp"]
    containers:
      test:
        secretEnvVars:
          TEST_APP_LEVEL1_TEST_ENV3:
            _default: default value from envVars
        envVars:
          TESTAPP_LEVEL1_TESTENV3:
            _default: default value from envVars
          TESTAPP_LEVEL1_TESTENV4:
            prod: prod value from envVars
          TESTAPP_LEVEL1_MUSTDELETEDENV:
            prod: ""
        envYAML:
          testApp:
            level1:
              testEnvIgnored: test ignored #error, will be ignored - the variable description must contain the "_default" key
              testEnvIgnored_2:
                test: test ignored  #error, will be ignored - the variable description must contain the "_default" key
              testEnv3:
                _default:  default value #no error, the variable description must contain the "_default" key
                prod: from envYAML
              testEnv4:
                _default: default value
                prod: prod value from envYAML
              alterName1:
                name: ALTER_NAME_YAML
                _default: default value
              mustDeletedEnv:
                _default: must deleted in prod
              level2:
                test:
                  _default: default value #no error, the variable description must contain the "_default" key
        configFiles:
          conf:
            mountPath: /config
            content: |
              test
        configFilesYAML:
          config:
            mountPath: /config
            content:
              _include_files: ['config/test-include-{{ print "files" }}.yaml']
              overwrited:
                _default: default value from values.yaml
              testIncludeVar:
                _default: default value from values.yaml
              testIncludeVarMustOverwrited:
                _default: default value from values.yaml
                prod: prod value from values.yaml
              level1:
                testMap: #this map will be overwritten
                  _default:
                    test1: 2v
                    test2: 2v
                  prod:
                    testProd2: 2v
                testMap2: #this map will be merged
                  testNestedMap:
                      nestedMap:
                        test: 3v
                  test: 2v
                  test2:
                    _default: 2v
                    prod: 3v
                  test3:
                    _default: 2v

apps-karpenter-node-class:
  # Test case 1: minimal EC2NodeClass (role + three required selectors)
  minimal-class:
    _include: ["apps-karpenter-defaultNodeClass"]
    role: "KarpenterNodeRole-my-cluster"
    amiSelectorTerms: |
      - alias: al2023@latest
    subnetSelectorTerms: |
      - tags:
          karpenter.sh/discovery: my-cluster
    securityGroupSelectorTerms: |
      - tags:
          karpenter.sh/discovery: my-cluster

  # Test case 2: full EC2NodeClass (all optional fields)
  full-class:
    _include: ["apps-karpenter-defaultNodeClass"]
    role: "KarpenterNodeRole-my-cluster"
    amiSelectorTerms: |
      - alias: al2023@latest
    subnetSelectorTerms: |
      - tags:
          karpenter.sh/discovery: my-cluster
    securityGroupSelectorTerms: |
      - tags:
          karpenter.sh/discovery: my-cluster
    amiFamily: AL2023
    instanceStorePolicy: RAID0
    detailedMonitoring: true
    associatePublicIPAddress: false
    ipPrefixCount: 1
    tags:
      env: production
    userData: |
      #!/bin/bash
      echo "hello"
    blockDeviceMappings: |
      - deviceName: /dev/xvda
        ebs:
          volumeSize: 100Gi
          volumeType: gp3
          encrypted: true
          deleteOnTermination: true
    capacityReservationSelectorTerms: |
      - tags:
          env: prod
    metadataOptions:
      httpEndpoint: enabled
      httpProtocolIPv6: disabled
      httpTokens: required
      httpPutResponseHopLimit: 1
    kubelet:
      podsPerCore: 2
      maxPods: 110
      evictionMaxPodGracePeriod: 60
      imageGCHighThresholdPercent: 85
      imageGCLowThresholdPercent: 80
      cpuCFSQuota: true
      clusterDNS: |
        - 10.0.1.100
      systemReserved:
        cpu: 100m
        memory: 100Mi
        ephemeral-storage: 1Gi
      kubeReserved:
        cpu: 200m
        memory: 100Mi
        ephemeral-storage: 3Gi
      evictionHard:
        memory.available: 5%
        nodefs.available: 10%
        nodefs.inodesFree: 10%
      evictionSoft:
        memory.available: 500Mi
        nodefs.available: 15%
      evictionSoftGracePeriod:
        memory.available: 1m
        nodefs.available: 1m30s

apps-karpenter-node-pool:
  # Test case 3: minimal NodePool (only required nodeClassRef.name + requirements)
  minimal-pool:
    _include: ["apps-karpenter-defaultNodePool"]
    nodeClassRef:
      name: minimal-class
    requirements: |
      - key: karpenter.sh/capacity-type
        operator: In
        values: ["spot", "on-demand"]

  # Test case 4: full NodePool (all optional fields)
  full-pool:
    _include: ["apps-karpenter-defaultNodePool"]
    weight: 10
    nodeClassRef:
      name: full-class
      group: karpenter.k8s.aws
      kind: EC2NodeClass
    requirements: |
      - key: karpenter.sh/capacity-type
        operator: In
        values: ["spot", "on-demand"]
      - key: kubernetes.io/arch
        operator: In
        values: ["amd64"]
    taints: |
      - key: dedicated
        effect: NoSchedule
    startupTaints: |
      - key: startup
        effect: NoSchedule
    expireAfter: "720h"
    terminationGracePeriod: "48h"
    limits:
      cpu: "1000"
      memory: 1000Gi
    labels:
      team: my-team
    annotations:
      billing: my-team
    nodeLabels:
      node-role: worker
    nodeAnnotations:
      cluster: my-cluster
    disruption:
      consolidationPolicy: WhenEmptyOrUnderutilized
      consolidateAfter: 1m
      budgets: |
        - nodes: 10%
        - nodes: "0"
          schedule: "0 9 * * mon-fri"
          duration: 8h
