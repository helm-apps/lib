{{- define "apps-default-values" }}
global:
  ## A more powerful alternative to Helm's limited YAML anchors. Avoids duplicating configuration across multiple apps.
  #
  # Configuration blocks are declared here under global._includes and can be referenced anywhere in values files.
  # Example of referencing a block:
  # -----------------------------------------------------------------------------------------------
  # .helm/values.yaml:
  # -----------------------------------------------------------------------------------------------
  # apps-cronjobs:
  #   cronjob-1:
  #     _include: ["apps-cronjobs-defaultCronJob"]
  #     backoffLimit: 1
  # -----------------------------------------------------------------------------------------------
  #
  # In the example above, the include block expands at apps-cronjobs.cronjob-1 level; then backoffLimit: 1 is merged on top, overriding the value from the block.
  #
  _includes:
    apps-default-library-app:
      enabled: false
      imagePullSecrets: |
        - name: registrysecret
    ## Default configuration for CronJob as a whole.
    apps-cronjobs-defaultCronJob:
      _include: ["apps-default-library-app"]
      # CLIENT: ask if this is ok for a default
      concurrencyPolicy: "Forbid"
      successfulJobsHistoryLimit: 1
      failedJobsHistoryLimit: 1
      # CLIENT: ask if this is ok for a default
      backoffLimit: 0
      priorityClassName:
        prod: "production-high"
        production: "production-high"
      restartPolicy: "Never"
      startingDeadlineSeconds: 60
      verticalPodAutoscaler:
        enabled: true
        updateMode: "Off"
        resourcePolicy: |
          {}

    ## Default configuration for CronJob init containers.
    apps-cronjobs-defaultCronJobInitContainer:
      enabled: true

    ## Default configuration for CronJob containers.
    apps-cronjobs-defaultCronJobContainer:
      enabled: true

    apps-secrets-defaultSecret:
      _include: ["apps-default-library-app"]
    apps-ingresses-defaultIngress:
      _include: ["apps-default-library-app"]
      ingressClassName: "nginx"

    ## Default configuration for Job as a whole.
    apps-jobs-defaultJob:
      _include: ["apps-default-library-app"]
      # CLIENT: ask if this is ok for a default
      backoffLimit: 0
      priorityClassName:
        prod: "production-high"
      restartPolicy: "Never"
      verticalPodAutoscaler:
        enabled: true
        updateMode: "Off"
        resourcePolicy: |
          {}

    ## Default configuration for Job init containers.
    apps-jobs-defaultJobInitContainer:
      enabled: true

    ## Default configuration for Job containers.
    apps-jobs-defaultJobContainer:
      enabled: true


    ## Default configuration for the application as a whole.
    apps-stateful-defaultApp:
      _include: ["apps-default-library-app"]
      revisionHistoryLimit: 3
      terminationGracePeriodSeconds:
        _default: 30
        prod: 60
        rspec: 3
      affinity: |
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - podAffinityTerm:
              labelSelector:
                matchLabels: {{ include "lib.generateSelectorLabels" (list $ . .name) | nindent 22 }}
              topologyKey: kubernetes.io/hostname
            weight: 10
      priorityClassName:
        prod: "production-medium"
      podDisruptionBudget:
        enabled: true
        maxUnavailable: "15%"
      verticalPodAutoscaler:
        enabled: true
        updateMode: "Off"
      service:
        enabled: false
        name: "{{ $.CurrentApp.name }}"
        headless: true

    ## Default configuration for stateful application init containers.
    apps-stateful-defaultAppInitContainer:
      enabled: true

    ## Default configuration for stateful application containers.
    apps-stateful-defaultAppContainer:
      enabled: true

    ## Default configuration for the application as a whole.
    apps-stateless-defaultApp:
      _include: ["apps-default-library-app"]
      revisionHistoryLimit: 3
      strategy:
        _default: |
          rollingUpdate:
            maxSurge: 20%
            maxUnavailable: 50%
          type: RollingUpdate
        prod: |
          rollingUpdate:
            maxSurge: 20%
            maxUnavailable: 5%
          type: RollingUpdate
        production: |
          rollingUpdate:
            maxSurge: 20%
            maxUnavailable: 5%
          type: RollingUpdate
      priorityClassName:
        prod: "production-medium"
        production: "production-medium"
      podDisruptionBudget:
        enabled: true
        maxUnavailable: "10%"
      verticalPodAutoscaler:
        enabled: true
        updateMode: "Off"
        resourcePolicy: |
          {}
      horizontalPodAutoscaler:
        enabled: false
      service:
        enabled: false
        name: "{{ $.CurrentApp.name }}"
        headless: true
    ## Default configuration for stateless application init containers.
    apps-stateless-defaultAppInitContainer:
      enabled: true

    ## Default configuration for stateless application containers.
    apps-stateless-defaultAppContainer:
      enabled: true
    apps-configmaps-defaultConfigmap:
      _include: ["apps-default-library-app"]
{{- end }}
